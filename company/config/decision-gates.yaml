# 关键决策点门禁配置（Decision Gates）
#
# 定义 7 类必须人工确认的决策动作。CEO/COO 在执行对应动作前调用
# DecisionGate.check(action_type, context)，命中触发条件即拦截并请求人工确认。
#
# 评估逻辑：
# - trigger_condition 内多个条件字段为 OR 关系（任一命中即触发）
# - 字段命名约定（操作符后缀）：
#     _gt  : 大于        (context_value > threshold)
#     _lt  : 小于        (context_value < threshold)
#     _gte : 大于等于    (context_value >= threshold)
#     _lte : 小于等于    (context_value <= threshold)
#     _eq  : 等于        (context_value == threshold)
#     无后缀: 等于判断（用于布尔/字符串字段）
# - or_ 前缀仅作可读性提示，不影响评估逻辑（所有条件本就是 OR 关系）
#
# 字段说明：
# - action_type:     动作类型枚举（与 DecisionGate.check 入参一致）
# - name:            决策点中文名
# - trigger_condition: 触发条件字典（OR 关系）
# - confirm_scope:   谁确认：user / ceo / coo
# - timeout_minutes: 确认超时分钟数
# - timeout_action:  超时降级策略：cancel（取消）/ defer（推迟）/ escalate（升级）
# - description:     决策点说明

decision_gates:
  - action_type: product_initiate
    name: 产品立项
    trigger_condition:
      expected_cost_usd_gt: 20
      or_expected_duration_days_gt: 3
    confirm_scope: user
    timeout_minutes: 60
    timeout_action: defer
    description: 产品立项决策需用户确认（预计成本 > $20 或预计周期 > 3 天）

  - action_type: order_quote
    name: 对外报价
    trigger_condition:
      quoted_price_usd_gt: 50
      or_discount_percent_gt: 20
    confirm_scope: user
    timeout_minutes: 60
    timeout_action: defer
    description: 对外报价需用户确认（报价 > $50 或折扣 > 20%）

  - action_type: external_publish
    name: 对外发布内容
    trigger_condition:
      first_time_channel: true
      or_sensitive_topic: true
    confirm_scope: coo
    timeout_minutes: 30
    timeout_action: defer
    description: 对外发布需确认（首次发布到新渠道或含敏感话题）

  - action_type: real_payment
    name: 真实出款
    trigger_condition:
      any_amount: true
    confirm_scope: user
    timeout_minutes: 60
    timeout_action: cancel
    description: 真实出款需用户确认（任意金额，沿用现有 PaymentGate）

  - action_type: crypto_outflow
    name: 出币操作
    trigger_condition:
      any_amount: true
    confirm_scope: user
    timeout_minutes: 120
    timeout_action: cancel
    description: 出币操作强制人工确认（任意金额，沿用现有 outflow_gate）

  - action_type: strategy_adjust
    name: 战略方向调整
    trigger_condition:
      quarterly_strategy: true
    confirm_scope: ceo
    timeout_minutes: 1440
    timeout_action: escalate
    description: 季度战略方向调整需 CEO 确认

  - action_type: order_accept_reject
    name: 订单接收/拒绝
    trigger_condition:
      order_amount_usd_gt: 100
      or_first_time_client: true
    confirm_scope: user
    timeout_minutes: 60
    timeout_action: defer
    description: 订单接收/拒绝需确认（订单金额 > $100 或客户首次合作）
